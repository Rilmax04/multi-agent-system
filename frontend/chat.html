<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Crypto Chat</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
body {
  background:#f8f9fa;
}

.chat-container {
  height:500px;
  overflow-y:auto;
}

.message {
  max-width:80%;
  padding:12px 14px;
  border-radius:12px;
  font-size:14px;
}

.message-user {
  background:#0d6efd;
  color:white;
  margin-left:auto;
}

.message-ai {
  background:#e9ecef;
}

.suggested-box {
  background:#f1f3f5;
  border-radius:10px;
}

.market-card {
  background:#f8f9fa;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container py-5">
  <div class="row g-4">

    <!-- CHAT -->
    <div class="col-lg-8">

      <div class="card">
        <div class="card-header fw-semibold">
          AI Chat Assistant
        </div>

        <div class="card-body">

          <!-- Messages -->
          <div id="chatMessages" class="chat-container mb-4 d-flex flex-column gap-3"></div>

          <!-- Suggested actions -->
          <div class="p-3 mb-4 suggested-box">
            <div class="small fw-medium text-secondary mb-2">
              Suggested actions
            </div>
            <div id="suggestedActions" class="d-flex flex-wrap gap-2"></div>
          </div>

          <!-- Input -->
          <div class="d-flex gap-2">
            <input
              id="chatInput"
              type="text"
              class="form-control"
              placeholder="Ask a question about cryptocurrencies..."
            />
            <button id="sendBtn" class="btn btn-primary d-flex align-items-center gap-2">
              <i class="bi bi-send"></i>
              Ask
            </button>
          </div>

        </div>
      </div>

    </div>

    <!-- SIDEBAR -->
    <div class="col-lg-4">

      <div class="card">
        <div class="card-header fw-semibold">
          Quick Market Info
        </div>

        <div class="card-body" id="marketInfo"></div>
      </div>

    </div>

  </div>
</div>

<script>
/* =========================
   MOCK DATA (dynamic JSON)
========================= */

let messages = [
  {
    id:1,
    type:"ai",
    content:"Hello! I'm your cryptocurrency analysis assistant. Ask me anything about crypto markets, prices, trends, or specific coins."
  },
  {
    id:2,
    type:"user",
    content:"What is the current Bitcoin price?"
  },
  {
    id:3,
    type:"ai",
    content:"Bitcoin (BTC) is currently trading at $45,234.50 USD, with a 24-hour change of +2.3%. The market cap is $884.5B and the 24-hour volume is $28.3B."
  }
];

const suggestedActions = [
  { label:"Compare BTC and ETH", icon:"bi-arrow-left-right" },
  { label:"Show top 5 coins", icon:"bi-graph-up" },
  { label:"Analyze volatility", icon:"bi-activity" }
];

const marketData = {
  coins:[
    {
      name:"Bitcoin (BTC)",
      change:"+2.3%",
      price:"$45,234.50",
      volume:"$28.3B",
      positive:true
    },
    {
      name:"Ethereum (ETH)",
      change:"+1.8%",
      price:"$2,456.30",
      volume:"$15.7B",
      positive:true
    }
  ],
  trend:"Bullish momentum across major cryptocurrencies",
  stats:{
    marketCap:"$1.82T",
    volume24h:"$89.4B",
    dominance:"48.6%"
  }
};


/* =========================
   CHAT RENDER
========================= */

const chatBox = document.getElementById("chatMessages");

function renderMessages() {
  chatBox.innerHTML = "";

  messages.forEach(msg => {
    const wrapper = document.createElement("div");
    wrapper.className = "d-flex " + (msg.type === "user"
      ? "justify-content-end"
      : "justify-content-start");

    const bubble = document.createElement("div");
    bubble.className =
      "message " + (msg.type === "user"
        ? "message-user"
        : "message-ai");

    bubble.textContent = msg.content;

    wrapper.appendChild(bubble);
    chatBox.appendChild(wrapper);
  });

  chatBox.scrollTop = chatBox.scrollHeight;
}


/* =========================
   SEND MESSAGE
========================= */

function sendMessage() {
  const input = document.getElementById("chatInput");
  const text = input.value.trim();
  if (!text) return;

  messages.push({
    id: Date.now(),
    type:"user",
    content:text
  });

  input.value="";
  renderMessages();

  // fake AI response
  setTimeout(() => {
    messages.push({
      id: Date.now()+1,
      type:"ai",
      content:"Thank you for your question. I'm analyzing the cryptocurrency data to provide you with an accurate answer..."
    });

    renderMessages();
  },1000);
}

document.getElementById("sendBtn").onclick = sendMessage;

document
  .getElementById("chatInput")
  .addEventListener("keypress", e => {
    if (e.key === "Enter") sendMessage();
  });


/* =========================
   SUGGESTED ACTIONS
========================= */

const actionsContainer = document.getElementById("suggestedActions");

suggestedActions.forEach(action => {
  const btn = document.createElement("button");
  btn.className = "btn btn-outline-secondary btn-sm d-flex align-items-center gap-2";

  btn.innerHTML = `
    <i class="bi ${action.icon}"></i>
    ${action.label}
  `;

  btn.onclick = () => {
    document.getElementById("chatInput").value = action.label;
  };

  actionsContainer.appendChild(btn);
});


/* =========================
   MARKET INFO RENDER
========================= */

const marketContainer = document.getElementById("marketInfo");

function renderMarket() {

  const coinsHTML = marketData.coins.map(c => `
    <div class="p-3 mb-3 market-card">
      <div class="d-flex justify-content-between mb-1">
        <span class="small text-secondary">${c.name}</span>
        <span class="small fw-semibold ${c.positive ? 'text-success':'text-danger'}">
          ${c.change}
        </span>
      </div>
      <div class="fs-4 fw-bold">${c.price}</div>
      <div class="small text-muted">24h Volume: ${c.volume}</div>
    </div>
  `).join("");

  marketContainer.innerHTML = `
    ${coinsHTML}

    <div class="p-3 mb-3 border border-success rounded bg-success-subtle">
      <div class="d-flex align-items-center gap-2 mb-2">
        <i class="bi bi-graph-up text-success"></i>
        <span class="fw-semibold text-success">Market Trend</span>
      </div>
      <div class="small text-success">
        ${marketData.trend}
      </div>
    </div>

    <div class="pt-3 border-top">
      <div class="d-flex justify-content-between small mb-2">
        <span class="text-secondary">Total Market Cap</span>
        <span class="fw-semibold">${marketData.stats.marketCap}</span>
      </div>
      <div class="d-flex justify-content-between small mb-2">
        <span class="text-secondary">24h Volume</span>
        <span class="fw-semibold">${marketData.stats.volume24h}</span>
      </div>
      <div class="d-flex justify-content-between small">
        <span class="text-secondary">BTC Dominance</span>
        <span class="fw-semibold">${marketData.stats.dominance}</span>
      </div>
    </div>
  `;
}


/* =========================
   INIT
========================= */

renderMessages();
renderMarket();

</script>

</body>
</html>
