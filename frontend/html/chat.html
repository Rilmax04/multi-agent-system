<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Crypto Chat</title>

  <!-- Markdown -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Page styles -->
  <link rel="stylesheet" href="../css/chat.css">
  <link rel="stylesheet" href="../css/autocomplete.css">
</head>

<body>

<div id="navbar"></div>

<div class="container py-5">
  <div class="row g-4">

    <!-- CHAT -->
    <div class="col-lg-8">
      <div class="card">
        <div class="card-header fw-semibold">
          AI Chat Assistant
        </div>
        <div class="card-body">

          <!-- Messages -->
          <div id="chatMessages" class="chat-container mb-4 d-flex flex-column gap-3"></div>

          <!-- Suggested actions -->
          <div class="p-3 mb-4 suggested-box">
            <div class="small fw-medium text-secondary mb-2">
              Suggested actions
            </div>
            <div id="suggestedActions" class="d-flex flex-wrap gap-2"></div>
          </div>

          <!-- Input -->
          <div class="d-flex gap-2">
            <div class="wrap">
              <input
                id="chatInput"
                type="text"
                class="form-control"
                placeholder="Ask a question about cryptocurrencies..."
              />
              <ul id="autocompleteList"></ul>
            </div>
            <button id="sendBtn" class="btn btn-primary d-flex align-items-center gap-2">
              <i class="bi bi-send"></i>
              Ask
            </button>
          </div>

        </div>
      </div>
    </div>

    <!-- SIDEBAR -->
    <div class="col-lg-4">
      <div class="card">
        <div class="card-header fw-semibold">
          Quick Market Info
        </div>
        <div class="card-body" id="marketInfo"></div>
      </div>
    </div>

  </div>
</div>

<!-- Page logic -->
<script src="../js/chat.js"></script>
<script src="../js/autocomplete.js"></script>

<!-- Navbar loader -->
<script src="../js/navbar-loader.js"></script>

</body>
</html>
