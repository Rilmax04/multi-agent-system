<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Analytics</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Page styles -->
  <link rel="stylesheet" href="../css/analytics.css">
</head>

<body>

<div id="navbar"></div>

<div class="container py-5">
  <div
    id="globalErrorBanner"
    class="alert alert-danger d-none"
    role="alert"
  >
  </div>

  <!-- COIN SELECTOR -->
  <div class="card mb-4">
    <div class="card-body d-flex align-items-center gap-3 flex-wrap">
      <label class="fw-medium small text-secondary mb-0">
        Select coin
      </label>
      <select id="coinSelect" class="form-select" style="width:200px"></select>
      <button id="applyBtn" class="btn btn-outline-primary btn-sm">
        Apply
      </button>
    </div>
  </div>

  <!-- CHARTS -->
  <div class="row g-4 mb-4">

    <div class="col-lg-6">
      <div class="card">
        <div class="card-header fw-semibold" id="priceChartTitle">
          Price Chart
        </div>
        <div class="card-body">
          <canvas id="priceChart"></canvas>
        </div>
      </div>
    </div>

    <div class="col-lg-6">
      <div class="card">
        <div class="card-header fw-semibold">
          Market Capitalization Change
        </div>
        <div class="card-body">
          <canvas id="marketCapChart"></canvas>
        </div>
      </div>
    </div>

  </div>

  <!-- TABLE -->
  <div class="card">
    <div class="card-header fw-semibold">
      Coin Comparison Table
    </div>
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table mb-0 align-middle">
          <thead class="table-light">
            <tr>
              <th>Coin</th>
              <th class="text-end">Price</th>
              <th class="text-end">24h Change</th>
              <th class="text-end">Market Cap</th>
              <th class="text-end">Volume</th>
            </tr>
          </thead>
          <tbody id="coinTable"></tbody>
        </table>
      </div>
    </div>
  </div>

</div>

<!-- Page logic -->
<script src="../js/global-error.js"></script>
<script src="../js/analytics.js"></script>

<!-- Navbar loader -->
<script src="../js/navbar-loader.js"></script>

</body>
</html>
